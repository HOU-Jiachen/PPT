<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F6F8FB"/>
<rect x="54" y="58" width="8" height="32" fill="#0E9F9A"/>
<text x="78" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#5B6F82">第2章 项目概况 | 08</text>
<text x="54" y="132" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#132D46">项目主要服务三村农业灌溉，并兼顾防洪与生态功能</text>
<circle cx="70" cy="198" r="5" fill="#0E9F9A"/>
<text x="90" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">玉泉水库位于当阳市，以农业灌溉为主，兼顾防洪、生态等综合效益。</text>
<circle cx="70" cy="252" r="5" fill="#0E9F9A"/>
<text x="90" y="259" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">供水范围覆盖子龙村、合意村、玉泉村3个行政村。</text>
<circle cx="70" cy="306" r="5" fill="#0E9F9A"/>
<text x="90" y="313" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">水库灌区农田总面积为17621.55亩，主要种植水稻、油菜及蔬菜。</text>
<text x="54" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal" fill="#5B6F82">来源：报告2.1、基本情况表</text>
</svg>