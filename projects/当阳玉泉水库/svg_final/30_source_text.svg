<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F6F8FB"/>
<rect x="54" y="58" width="8" height="32" fill="#0E9F9A"/>
<text x="78" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#5B6F82">第9章 结论建议 | 30</text>
<text x="54" y="132" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#132D46">报告总体认为项目取用水合理、联合水源方案可行</text>
<circle cx="70" cy="198" r="5" fill="#0E9F9A"/>
<text x="90" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">项目服务于现有农业灌溉，规划水平年不以扩大种植规模增加需水。</text>
<circle cx="70" cy="252" r="5" fill="#0E9F9A"/>
<text x="90" y="259" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">玉泉水库天然来水与东风三干渠补水组成联合水源。</text>
<circle cx="70" cy="306" r="5" fill="#0E9F9A"/>
<text x="90" y="313" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">落实生态下泄、库水位控制、农业面源治理和水质监测后，取水与退水影响总体可控。</text>
<text x="54" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal" fill="#5B6F82">来源：报告第9章结论</text>
</svg>