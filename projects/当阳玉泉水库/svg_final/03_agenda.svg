<text x="90" y="367" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">4 用水合理性 需水、供水平衡与核定。</text>
<circle cx="70" cy="414" r="5" fill="#0E9F9A"/>
<text x="90" y="421" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">5 取水水源 联合水源与可靠性。</text>
<text x="54" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal" fill="#5B6F82">来源：报告目录</text>
