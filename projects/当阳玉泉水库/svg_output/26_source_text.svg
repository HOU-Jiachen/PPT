<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F6F8FB"/>
<rect x="54" y="58" width="8" height="32" fill="#0E9F9A"/>
<text x="78" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#5B6F82">第7章 退水影响 | 26</text>
<text x="54" y="132" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#132D46">退水方案可行，但面源污染控制需要运行期验证</text>
<circle cx="70" cy="198" r="5" fill="#0E9F9A"/>
<text x="90" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">退水与灌水周期同步，7—8月为高峰，非灌溉季基本无退水。</text>
<circle cx="70" cy="252" r="5" fill="#0E9F9A"/>
<text x="90" y="259" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">土壤吸附、沟渠沉淀和植被拦截可降低污染负荷。</text>
<circle cx="70" cy="306" r="5" fill="#0E9F9A"/>
<text x="90" y="313" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">仍需通过化肥农药减量、生态沟渠和关键断面监测验证环境风险。</text>
<text x="54" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal" fill="#5B6F82">来源：报告7.1—7.5</text>
</svg>