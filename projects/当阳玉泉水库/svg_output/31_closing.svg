<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="1280" height="720" fill="#F6F8FB"/>
<rect x="54" y="58" width="8" height="32" fill="#0E9F9A"/>
<text x="78" y="82" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#5B6F82">第9章 结论建议 | 31</text>
<text x="54" y="132" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#132D46">建议把五项条件写入许可与后续实施要求</text>
<circle cx="70" cy="198" r="5" fill="#0E9F9A"/>
<text x="90" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">统一计算口径 复核设计径流、生态流量、本地可供水量和外调补水量。</text>
<circle cx="70" cy="252" r="5" fill="#0E9F9A"/>
<text x="90" y="259" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">落实引水协议 明确三干渠月度流量、时段、调度原则和年度总引水量。</text>
<circle cx="70" cy="306" r="5" fill="#0E9F9A"/>
<text x="90" y="313" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">锁定总量指标 将750万m3取水量纳入年度计划和区域总量统筹。</text>
<circle cx="70" cy="360" r="5" fill="#0E9F9A"/>
<text x="90" y="367" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">完善监测闭环 覆盖取水、配水、库容、退水和关键水质断面。</text>
<circle cx="70" cy="414" r="5" fill="#0E9F9A"/>
<text x="90" y="421" font-family="Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="normal" fill="#132D46">强化设施管护 推进末级渠系防渗、计量校验和长效运维经费。</text>
<text x="54" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="normal" fill="#5B6F82">来源：报告9.2及第4—8章</text>
</svg>